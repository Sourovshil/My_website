<!DOCTYPE html>
<html>
<head>
<title>IP Rotation Detection</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
}

.container{
width:900px;
margin:60px auto;
display:flex;
gap:30px;
}

.card{
background:linear-gradient(145deg,#0b1220,#0a0f1a);
padding:30px;
border-radius:18px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
flex:1;
}

.title{
font-size:26px;
margin-bottom:20px;
}

.ipbox{
background:linear-gradient(135deg,#1d4ed8,#9333ea);
padding:20px;
border-radius:14px;
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.status{
background:#064e3b;
padding:12px;
border-radius:10px;
margin-bottom:20px;
text-align:center;
}

.controls button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(135deg,#06b6d4,#9333ea);
color:white;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
padding:10px;
background:#020617;
color:white;
}

.interval{
margin-top:15px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">IP Rotation Detection</div>

<div class="ipbox" id="ipDisplay">
Detecting IP...
</div>

<div class="status" id="statusBox">
System Idle
</div>

<div class="controls">
<button onclick="startMonitor()">Start</button>
<button onclick="forceCheck()">Force Check</button>
</div>

<div class="interval">
Interval: 5 sec
</div>

</div>

<div class="card">

<div style="margin-bottom:10px;">Open site on IP change</div>

<textarea id="targetLink" placeholder="One URL per line"></textarea>

</div>

</div>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let lastIP=null;
let monitorRunning=false;

async function getIP(){
let res=await fetch("https://api.ipify.org");
return await res.text();
}

async function checkIP(){

if(!monitorRunning) return;

let ip=await getIP();

document.getElementById("ipDisplay").innerHTML=ip;

if(lastIP && ip!==lastIP){

document.getElementById("statusBox").innerHTML="IP CHANGED 🚨";
document.getElementById("alarmSound").play();

let urls=document.getElementById("targetLink").value.split("\n");

urls.forEach(u=>{
if(u.trim()!=""){
window.open(u.trim(),"_blank");
}
});

}else{
document.getElementById("statusBox").innerHTML="IP Stable";
}

lastIP=ip;

setTimeout(checkIP,5000);
}

async function startMonitor(){
monitorRunning=true;
lastIP=await getIP();
document.getElementById("ipDisplay").innerHTML=lastIP;
document.getElementById("statusBox").innerHTML="Monitoring Started";
checkIP();
}

function forceCheck(){
checkIP();
}

</script>

</body>
</html>
