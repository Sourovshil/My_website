<!DOCTYPE html>
<html>
<head>
<title>IP Rotation Detection</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:radial-gradient(circle at top,#0f172a,#020617);
color:#e5e7eb;
}

.wrapper{
max-width:1200px;
margin:auto;
padding:20px;
display:flex;
flex-wrap:wrap;
gap:20px;
}

.panel{
flex:1 1 500px;
background:linear-gradient(145deg,#0b1220,#060b16);
border-radius:18px;
padding:22px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.heading{font-size:22px;margin-bottom:15px;}

.ipcard{
display:flex;
gap:15px;
align-items:center;
background:linear-gradient(135deg,#2563eb,#9333ea);
padding:18px;
border-radius:14px;
margin-bottom:15px;
transition:.4s;
}

.ipcard.alert{
box-shadow:0 0 35px red;
}

.ipbadge{
background:rgba(255,255,255,.15);
padding:10px 14px;
border-radius:12px;
font-weight:bold;
}

.iptext{font-size:22px;font-weight:600;}

.statusbar{
background:#064e3b;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
transition:.3s;
}

.controls button{
margin:4px;
padding:8px 14px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#06b6d4,#9333ea);
color:white;
font-weight:600;
}

.log{
background:#020617;
border-radius:10px;
padding:10px;
height:120px;
overflow:auto;
font-size:13px;
}

.smallbox{
background:#020617;
border-radius:12px;
padding:14px;
margin-top:15px;
}

.intelrow{
display:flex;
justify-content:space-between;
font-size:13px;
margin:3px 0;
opacity:.85;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:10px;
background:#020617;
color:white;
padding:10px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="panel">

<div class="heading">IP Rotation Detection</div>

<div class="ipcard" id="ipCard">
<div class="ipbadge">IP</div>
<div>
<div class="iptext" id="ipDisplay">Detecting...</div>
<div style="font-size:12px;opacity:.6">IPv4</div>
</div>
</div>

<div class="statusbar" id="statusBar">System Idle</div>

<div class="controls">
<button onclick="copyIP()">Copy</button>
<button onclick="toggleMute()" id="muteBtn">Mute</button>
<button onclick="forceCheck()">Force</button>
</div>

<div class="log" id="logBox">Waiting...</div>

<div class="smallbox" id="intelBox">Loading intelligence...</div>

</div>

<div class="panel">

<div class="heading">Trigger Settings</div>

<textarea id="targetLink" placeholder="One URL per line"></textarea>

</div>

</div>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let lastIP=null;
let muted=false;
let interval=5;

async function getIP(){
let r=await fetch("https://api.ipify.org");
return await r.text();
}

async function geoMulti(ip){

let data=null;

try{
let r=await fetch("https://ipwho.is/"+ip);
let j=await r.json();
if(j.success) data={
country:j.country,
city:j.city,
isp:j.connection?.isp,
asn:j.connection?.asn,
tz:j.timezone?.id
};
}catch{}

if(!data){
try{
let r=await fetch("https://ipapi.co/"+ip+"/json/");
let j=await r.json();
data={
country:j.country_name,
city:j.city,
isp:j.org,
asn:j.asn,
tz:j.timezone
};
}catch{}
}

if(!data){
document.getElementById("intelBox").innerHTML="Geo info unavailable";
return;
}

document.getElementById("intelBox").innerHTML=
`
<div class="intelrow"><span>Country</span><span>${data.country||"?"}</span></div>
<div class="intelrow"><span>City</span><span>${data.city||"?"}</span></div>
<div class="intelrow"><span>ISP</span><span>${data.isp||"?"}</span></div>
<div class="intelrow"><span>ASN</span><span>${data.asn||"?"}</span></div>
<div class="intelrow"><span>Timezone</span><span>${data.tz||"?"}</span></div>
<div class="intelrow"><span>Screen</span><span>${screen.width}x${screen.height}</span></div>
`;
}

async function monitor(){

let ip=await getIP();
document.getElementById("ipDisplay").innerText=ip;

if(!lastIP){
log("Initial IP "+ip);
geoMulti(ip);
}

if(lastIP && ip!==lastIP){

document.getElementById("statusBar").style.background="#7f1d1d";
document.getElementById("statusBar").innerText="IP Changed";
document.getElementById("ipCard").classList.add("alert");

log("Changed to "+ip);
geoMulti(ip);

if(!muted) document.getElementById("alarmSound").play();

let urls=document.getElementById("targetLink").value.split("\n");
urls.forEach(u=>{
if(u.trim()) window.open(u.trim(),"_blank");
});

setTimeout(()=>document.getElementById("ipCard").classList.remove("alert"),2000);

}else{
document.getElementById("statusBar").style.background="#064e3b";
document.getElementById("statusBar").innerText="Stable";
}

lastIP=ip;
setTimeout(monitor,interval*1000);
}

function log(t){
let b=document.getElementById("logBox");
b.innerHTML+="<br>"+new Date().toLocaleTimeString()+" "+t;
b.scrollTop=b.scrollHeight;
}

function forceCheck(){monitor();}

function toggleMute(){
muted=!muted;
document.getElementById("muteBtn").innerText=muted?"Unmute":"Mute";
}

function copyIP(){navigator.clipboard.writeText(lastIP);}

monitor();

</script>

</body>
</html>
