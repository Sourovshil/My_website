<!DOCTYPE html>
<html>
<head>
<title>IP Change Alarm Monitor</title>

<style>

body{
background: linear-gradient(135deg,#050505,#0b1a0b);
font-family: Consolas, monospace;
color:#00ff9c;
text-align:center;
margin-top:70px;
}

h2{
font-size:40px;
letter-spacing:2px;
text-shadow:0 0 15px #00ff9c;
}

p{
font-size:18px;
margin-bottom:20px;
}

input{
padding:14px;
width:420px;
font-size:16px;
border:none;
border-radius:8px;
outline:none;
background:#0f0f0f;
color:#00ff9c;
box-shadow:0 0 10px #00ff9c55;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00ff9c;
color:black;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff9c;
}

#status{
margin-top:35px;
font-size:22px;
text-shadow:0 0 10px #00ff9c;
}

</style>

</head>

<body>

<h2>🌐 IP Change Alarm Monitor</h2>

<p>Enter website link to open when IP changes</p>

<input type="text" id="targetLink" placeholder="https://example.com">

<br>
<button onclick="startMonitor()">Start Monitoring</button>

<div id="status">Status: Idle</div>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let lastIP = null;
let monitorRunning = false;

async function getIP(){
    let res = await fetch("https://api.ipify.org");
    return await res.text();
}

async function checkIP(){

    if(!monitorRunning) return;

    try{
        let currentIP = await getIP();

        document.getElementById("status").innerHTML =
        "Current IP: " + currentIP;

        if(lastIP && currentIP !== lastIP){

            document.getElementById("alarmSound").play();

            let url = document.getElementById("targetLink").value;

            if(url){
                window.open(url, "_blank");
            }

        }

        lastIP = currentIP;

    }catch(e){
        document.getElementById("status").innerHTML =
        "Error checking IP...";
    }

    setTimeout(checkIP, 5000);
}

async function startMonitor(){

    monitorRunning = true;

    lastIP = await getIP();

    document.getElementById("status").innerHTML =
    "Monitoring started... Current IP: " + lastIP;

    checkIP();
}

</script>

</body>
</html>
