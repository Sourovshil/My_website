<!DOCTYPE html>
<html>
<head>
<title>IP Rotation Detection</title>

<style>
body{
margin:0;
font-family:Inter,Segoe UI,Arial;
background:radial-gradient(circle at top,#0f172a,#020617);
color:#e5e7eb;
}
.wrapper{
width:1100px;
margin:50px auto;
display:flex;
gap:25px;
}
.panel{
background:linear-gradient(145deg,#0b1220,#060b16);
border-radius:18px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.left{flex:2;}
.right{flex:1;}
.heading{
font-size:22px;
margin-bottom:15px;
}
.ipcard{
display:flex;
align-items:center;
gap:15px;
background:linear-gradient(135deg,#2563eb,#9333ea);
padding:18px;
border-radius:14px;
margin-bottom:15px;
}
.ipbadge{
background:rgba(255,255,255,0.15);
padding:12px 14px;
border-radius:12px;
font-weight:bold;
}
.iptext{
font-size:22px;
font-weight:600;
}
.statusbar{
background:#064e3b;
padding:10px;
border-radius:10px;
text-align:center;
margin-bottom:15px;
}
.controls button{
padding:8px 14px;
margin-right:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#06b6d4,#9333ea);
color:white;
font-weight:600;
}
.log{
margin-top:15px;
background:#020617;
border-radius:10px;
padding:12px;
height:120px;
overflow:auto;
font-size:13px;
opacity:0.8;
}
.smallbox{
background:#020617;
border-radius:12px;
padding:14px;
margin-top:15px;
}
.intelrow{
display:flex;
justify-content:space-between;
font-size:13px;
margin:4px 0;
opacity:.85;
}
.intervalBox{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}
.intervalBox button{
width:35px;
height:35px;
border-radius:10px;
border:none;
background:linear-gradient(135deg,#06b6d4,#9333ea);
color:white;
font-size:18px;
cursor:pointer;
}
textarea{
width:100%;
height:120px;
border-radius:10px;
border:none;
background:#020617;
color:white;
padding:10px;
}
.warn{
color:#ef4444;
font-size:13px;
text-align:center;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="panel left">

<div class="heading">IP Rotation Detection</div>

<div class="ipcard">
<div class="ipbadge">IP</div>
<div>
<div class="iptext" id="ipDisplay">Detecting...</div>
<div style="font-size:12px;opacity:.6">IPv4</div>
</div>
</div>

<div class="statusbar" id="statusBar">
System Idle
</div>

<div class="controls">
<button onclick="copyIP()">Copy IP</button>
<button onclick="toggleMute()" id="muteBtn">Mute</button>
<button onclick="forceCheck()">Force check</button>
</div>

<div class="log" id="logBox">
Waiting for monitoring...
</div>

<div class="smallbox" id="intelBox">
Loading IP intelligence...
</div>

</div>

<div class="panel right">

<div class="smallbox">
<div style="margin-bottom:6px;">How it works</div>
<div style="font-size:13px;opacity:.7">
After IP change system triggers alarm and opens sites.
</div>
</div>

<div class="smallbox">
<div style="margin-bottom:8px;">Settings</div>
<div class="intervalBox">
<button onclick="decInterval()">-</button>
<div id="intervalText">5 sec</div>
<button onclick="incInterval()">+</button>
</div>
</div>

<div class="smallbox">
<div style="text-align:center">Alarm sound</div>
</div>

<div class="smallbox">
<div class="warn">⚠ Allow pop-ups for this site.</div>
<div style="font-size:13px;margin-bottom:6px;">Open Site on IP Change</div>
<textarea id="targetLink" placeholder="One URL per line"></textarea>
</div>

</div>
</div>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let lastIP=null;
let interval=5;
let muted=false;
let monitorTimer=null;

async function getIP(){
let r=await fetch("https://api.ipify.org");
return await r.text();
}

async function loadIntel(){
try{

let r = await fetch("https://ipcheck.free.nf/intel.php?nocache=" + Date.now(), {
method: "GET",
mode: "cors",
cache: "no-store"
});

if(!r.ok) throw new Error("network");

let d = await r.json();

let vpnColor = d.vpn ? "#ef4444" : "#22c55e";
let vpnText = d.vpn ? "YES" : "NO";

let html = `
<div class="intelrow"><span>Country</span><span>${d.country}</span></div>
<div class="intelrow"><span>City</span><span>${d.city}</span></div>
<div class="intelrow"><span>ZIP</span><span>${d.zip || "N/A"}</span></div>
<div class="intelrow"><span>Fraud Score</span><span>${d.fraud}</span></div>
<div class="intelrow"><span>VPN</span><span style="color:${vpnColor}">${vpnText}</span></div>
<div class="intelrow"><span>Privacy Index</span><span>${d.privacy}/100</span></div>
<div class="intelrow"><span>Resolution</span><span>${screen.width}x${screen.height}</span></div>
`;

document.getElementById("intelBox").innerHTML = html;

}catch(e){
document.getElementById("intelBox").innerHTML = "Intel connection error";
console.log(e);
}
}


async function monitor(){

let ip=await getIP();
document.getElementById("ipDisplay").innerHTML=ip;

if(!lastIP){
log("Initial IP detected: "+ip);
loadIntel();
}

if(lastIP && ip!==lastIP){

document.getElementById("statusBar").innerHTML="IP CHANGED 🚨";
log("IP changed to "+ip);
loadIntel();

if(!muted){
document.getElementById("alarmSound").play();
}

let urls=document.getElementById("targetLink").value.split("\n");

urls.forEach(u=>{
if(u.trim()!=""){
window.open(u.trim(),"_blank");
}
});

}else{
document.getElementById("statusBar").innerHTML="IP is stable: "+ip;
}

lastIP=ip;
monitorTimer=setTimeout(monitor,interval*1000);
}

function log(t){
let box=document.getElementById("logBox");
box.innerHTML+="<br>"+new Date().toLocaleTimeString()+" "+t;
box.scrollTop=box.scrollHeight;
}

function forceCheck(){
clearTimeout(monitorTimer);
monitor();
}

function incInterval(){
interval++;
document.getElementById("intervalText").innerHTML=interval+" sec";
}

function decInterval(){
if(interval>1) interval--;
document.getElementById("intervalText").innerHTML=interval+" sec";
}

function toggleMute(){
muted=!muted;
document.getElementById("muteBtn").innerHTML=muted?"Unmute":"Mute";
}

function copyIP(){
navigator.clipboard.writeText(lastIP);
}

monitor();

</script>

</body>
</html>
